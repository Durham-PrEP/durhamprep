<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durham PrEP Clinic</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--navy:#08192d;
--glass:rgba(13,39,64,0.6);
--teal:#2cc4a8;
--red:#e8445a;
--white:#ffffff;
--muted:#8ba8bf;
--border:rgba(255,255,255,0.08);
}

body{
margin:0;
font-family:'DM Sans',sans-serif;
background:radial-gradient(circle at top right,#12334f, #08192d 60%);
color:var(--white);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(8,25,45,0.7);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}
nav a{color:var(--muted); text-decoration:none; margin-left:20px;}
nav a:hover{color:var(--teal);}

/* HERO */
.hero{
text-align:center;
padding:100px 20px;
}
.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:64px;
}
.hero span{color:var(--teal);}

/* SECTIONS */
.section{max-width:900px;margin:auto;padding:60px 20px;}

/* CARD */
.card{
background:var(--glass);
padding:30px;
border-radius:16px;
border:1px solid var(--border);
backdrop-filter:blur(10px);
}

/* BUTTON */
.btn{
display:block;
padding:14px;
margin-top:15px;
background:var(--teal);
color:#000;
text-align:center;
border:none;
cursor:pointer;
border-radius:6px;
text-decoration:none;
}

/* QUIZ */
.quiz-option{
display:block;
margin:10px 0;
padding:10px;
border:1px solid var(--border);
border-radius:8px;
cursor:pointer;
}
.quiz-option:hover{border-color:var(--teal);}

.quiz-result{
display:none;
margin-top:15px;
padding:15px;
border-radius:10px;
background:#0d2740;
}
.quiz-result.show{display:block;}
</style>
</head>

<body>

<nav>
<div>Durham<span style="color:var(--teal)">PrEP</span></div>
<div>
<a href="#prep">PrEP</a>
<a href="#pep">PEP</a>
<a href="#book">Book</a>
</div>
</nav>

<section class="hero">
<h1>Your health.<br><span>Protected.</span></h1>
<p>Confidential, judgment-free HIV prevention care.</p>
</section>

<!-- PREP -->
<section id="prep" class="section">
<div class="card">
<h2>PrEP Assessment</h2>

<label class="quiz-option"><input type="checkbox" class="prep"> Multiple partners</label>
<label class="quiz-option"><input type="checkbox" class="prep"> Partner may have HIV</label>
<label class="quiz-option"><input type="checkbox" class="prep"> Don’t always use condoms</label>
<label class="quiz-option"><input type="checkbox" class="prep"> STI in last year</label>

<button class="btn" onclick="runPrep()">Check</button>

<div id="prepResult" class="quiz-result"></div>
</div>
</section>

<!-- PEP -->
<section id="pep" class="section">
<div class="card">

<h2>Need PEP?</h2>
<p style="color:var(--muted)">Must be started within 72 hours.</p>

<input id="name" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px;">
<input id="contact" placeholder="Phone or email" style="width:100%; padding:10px; margin-bottom:10px;">

<label class="quiz-option"><input type="checkbox" id="q1"> Not on PrEP</label>
<label class="quiz-option"><input type="checkbox" id="q2"> Partner may have HIV</label>
<label class="quiz-option"><input type="checkbox" id="q3"> No condom</label>
<label class="quiz-option"><input type="checkbox" id="q4"> Within 72 hours</label>
<label class="quiz-option"><input type="checkbox" id="q5"> Assault/exposure</label>

<button class="btn" onclick="runPep()">Check</button>

<div id="pepResult" class="quiz-result"></div>

</div>
</section>

<!-- BOOK -->
<section id="book" class="section">
<div class="card">
<h2>Book Appointment</h2>
<a href="https://calendly.com/clinic-healrx/hiv-prep-consultation" class="btn">Book PrEP</a>
<a href="https://calendly.com/clinic-healrx/hiv-pep-urgent-consult" class="btn" style="background:var(--red); color:white;">Book PEP</a>
</div>
</section>

<!-- FORM -->
<form id="form" action="https://formspree.io/f/mreopjbg" method="POST" style="display:none;">
<input name="name" id="f_name">
<input name="contact" id="f_contact">
<input name="risk" id="f_risk">
</form>

<script>
function runPrep(){
let boxes=document.querySelectorAll('.prep');
let count=[...boxes].filter(b=>b.checked).length;
let r=document.getElementById("prepResult");

if(count===0) r.innerHTML="Low risk — consult recommended.";
else if(count<=2) r.innerHTML="You may benefit from PrEP.";
else r.innerHTML="PrEP strongly recommended.";

r.classList.add("show");
}

function runPep(){
let name=document.getElementById("name").value;
let contact=document.getElementById("contact").value;

if(!name||!contact){alert("Enter your info");return;}

let q1=document.getElementById("q1").checked;
let q2=document.getElementById("q2").checked;
let q3=document.getElementById("q3").checked;
let q4=document.getElementById("q4").checked;
let q5=document.getElementById("q5").checked;

let r=document.getElementById("pepResult");
let msg="",risk="";

if(q5&&q4){msg="URGENT: Seek PEP immediately.";risk="HIGH";}
else if(q4&&(q2||q3)){msg="High risk — start PEP ASAP.";risk="HIGH";}
else if(q4){msg="Moderate risk — act quickly.";risk="MODERATE";}
else if(!q4&&(q2||q3)){msg="Outside window — follow up.";risk="OUTSIDE";}
else{msg="Lower risk — consult recommended.";risk="LOW";}

r.innerHTML=msg+"<br><br><a href='https://calendly.com/clinic-healrx/hiv-pep-urgent-consult'>Book now</a>";
r.classList.add("show");

document.getElementById("f_name").value=name;
document.getElementById("f_contact").value=contact;
document.getElementById("f_risk").value=risk;

document.getElementById("form").submit();
}
</script>

</body>
</html>
